[tool.uv]
python-preference = "only-managed"

[tool.uv.workspace]
members = ["pyTale", "pytale-tools", "test-plugin"]

[tool.uv.sources]
pytale = { workspace = true }

[dependency-groups]
dev = [
    "black",
    "isort",
]

[tool.isort]
profile = "black"

[tool.mypy]
python_version = "3.12"
disallow_untyped_defs = true
